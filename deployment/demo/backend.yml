---
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-backend-nginx
  labels:
    app: demo-backend
data:
  default.conf: |
    server {
      listen 8080;
      location / {
        return 200 'Hello from backend!\n';
        add_header Content-Type text/plain;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-backend
  labels:
    app: demo-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-backend
  template:
    metadata:
      labels:
        app: demo-backend
    spec:
      containers:
        - name: backend
          image: nginx:alpine
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: nginx-conf
          configMap:
            name: demo-backend-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: demo-backend
  labels:
    app: demo-backend
spec:
  selector:
    app: demo-backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
