---
apiVersion: v1
kind: Service
metadata:
  name: tempo-nodeport
  labels:
    app.kubernetes.io/name: tempo
spec:
  type: NodePort
  ports:
  - name: tempo-prom-metrics
    port: 3100
    targetPort: 3100
    nodePort: 30311
  - name: grpc-tempo-otlp
    port: 4317
    protocol: TCP
    targetPort: 4317
    nodePort: 30431
  - name: tempo-otlp-http
    port: 4318
    protocol: TCP
    targetPort: 4318
    nodePort: 30432
  - name: tempo-jaeger-thrift-http
    port: 14268
    protocol: TCP
    targetPort: 14268
    nodePort: 31426
  - name: tempo-zipkin
    port: 9411
    protocol: TCP
    targetPort: 9411
    nodePort: 30941
  # UDP 端口 (Jaeger compact 6831/binary 6832) 不支持 NodePort 跨节点 UDP，保留 ClusterIP 访问
  # OpenCensus (55678) 和旧版 OTLP (55680/55681) 已废弃，不对外暴露
  selector:
    app.kubernetes.io/name: tempo
